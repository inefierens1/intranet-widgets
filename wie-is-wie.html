<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: transparent; font-family: 'Calibri', 'Segoe UI', sans-serif; }
    .cvo-knoppen-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.8rem; background: transparent; padding: 0; }
    .cvo-office-knop { display: flex; align-items: center; gap: 0.9rem; padding: 0.9rem 1rem; background-color: #f7f8f6; border: 1px solid #d8d8d8; cursor: pointer; text-decoration: none; color: #000000; position: relative; overflow: hidden; transition: background-color 0.18s ease; }
    .cvo-office-knop:hover { background-color: #e4e6e4; }
    .cvo-office-knop::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; }

    /* Merkkleuren — linkerbalk */
    .cvo-knop-roze::before  { background-color: #a28790; }
    .cvo-knop-groen::before { background-color: #889a91; }
    .cvo-knop-paars::before { background-color: #4a4247; }
    .cvo-knop-blauw::before { background-color: #5e91a5; }

    /* Hexagon-vulling per kleur (pastel) */
    .cvo-knop-roze  .cvo-hex-icon polygon.hex-bg { fill: #dacfd3; }
    .cvo-knop-groen .cvo-hex-icon polygon.hex-bg { fill: #ced7d2; }
    .cvo-knop-paars .cvo-hex-icon polygon.hex-bg { fill: #c8c6c7; }
    .cvo-knop-blauw .cvo-hex-icon polygon.hex-bg { fill: #b3cdc5; }

    .cvo-hex-wrapper { flex-shrink: 0; width: 48px; height: 48px; }
    .cvo-hex-icon { width: 48px; height: 48px; }
    .cvo-knop-tekst { display: flex; flex-direction: column; }
    .cvo-knop-label { font-family: 'Calibri', 'Segoe UI', sans-serif; font-weight: 700; font-size: 0.88rem; text-transform: uppercase; letter-spacing: 0.03em; color: #4d5554; line-height: 1.2; }
  </style>
</head>
