<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: transparent; font-family: 'Calibri', 'Segoe UI', sans-serif; }
    .cvo-knoppen-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.8rem; background: transparent; padding: 0; }
    @media (max-width: 480px) { .cvo-knoppen-grid { gap: 0.6rem; } .cvo-office-knop { gap: 0.6rem; padding: 0.8rem 0.7rem; } }
    .cvo-office-knop { display: flex; align-items: center; gap: 0.9rem; padding: 0.9rem 1rem; background-color: #f7f8f6; border: 1px solid #d8d8d8; cursor: pointer; text-decoration: none; color: #000000; position: relative; overflow: hidden; transition: background-color 0.18s ease; }
    .cvo-office-knop:hover { background-color: #e4e6e4; }
    .cvo-office-knop::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; }

    /* Merkkleuren — linkerbalk */
    .cvo-knop-roze::before  { background-color: #a28790; }
    .cvo-knop-groen::before { background-color: #889a91; }
    .cvo-knop-paars::before { background-color: #4a4247; }
    .cvo-knop-blauw::before { background-color: #5e91a5; }

    /* Hexagon-vulling per kleur (pastel) */
    .cvo-knop-roze  .cvo-hex-icon polygon.hex-bg { fill: #dacfd3; }
    .cvo-knop-groen .cvo-hex-icon polygon.hex-bg { fill: #ced7d2; }
    .cvo-knop-paars .cvo-hex-icon polygon.hex-bg { fill: #c8c6c7; }
    .cvo-knop-blauw .cvo-hex-icon polygon.hex-bg { fill: #b3cdc5; }

    .cvo-hex-wrapper { flex-shrink: 0; width: 48px; height: 48px; }
    .cvo-hex-icon { width: 48px; height: 48px; }
    .cvo-knop-tekst { display: flex; flex-direction: column; min-width: 0; }
    .cvo-knop-label { font-family: 'Calibri', 'Segoe UI', sans-serif; font-weight: 700; font-size: 0.88rem; text-transform: uppercase; letter-spacing: 0.03em; color: #4d5554; line-height: 1.2; overflow-wrap: anywhere; hyphens: auto; }
  </style>
</head>
<body>

<div class="cvo-knoppen-grid">

  <!-- Athenasoft -->
  <a href="https://athenasoft.crescendo-cvo.be/login" target="_blank" rel="noopener" class="cvo-office-knop cvo-knop-roze">
    <div class="cvo-hex-wrapper">
      <svg class="cvo-hex-icon" viewBox="0 0 100 115" xmlns="http://www.w3.org/2000/svg">
        <polygon class="hex-bg" points="50,2 95,28 95,87 50,113 5,87 5,28"/>
        <rect x="26" y="36" width="48" height="34" rx="3" fill="none" stroke="#4d5554" stroke-width="4"/>
        <line x1="26" y1="47" x2="74" y2="47" stroke="#4d5554" stroke-width="4"/>
        <circle cx="32" cy="41.5" r="1.8" fill="#4d5554"/>
        <circle cx="39" cy="41.5" r="1.8" fill="#4d5554"/>
        <line x1="34" y1="56" x2="66" y2="56" stroke="#4d5554" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="34" y1="63" x2="58" y2="63" stroke="#4d5554" stroke-width="3.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="cvo-knop-tekst">
      <span class="cvo-knop-label">Athenasoft</span>
    </div>

  <!-- Crescendo CVO Pro -->

      <svg class="cvo-hex-icon" viewBox="0 0 100 115" xmlns="http://www.w3.org/2000/svg">
        <polygon class="hex-bg" points="50,2 95,28 95,87 50,113 5,87 5,28"/>
        <circle cx="41" cy="42" r="9" fill="none" stroke="#4d5554" stroke-width="4"/>
        <path d="M25,71 Q25,55 41,55 Q52,55 55,62" fill="none" stroke="#4d5554" stroke-width="4" stroke-linecap="round"/>

        <path d="M58,64 L56,79 L64,74 L72,79 L70,64" fill="none" stroke="#4d5554" stroke-width="4" stroke-linejoin="round"/>

    <div class="cvo-knop-tekst">
      <span class="cvo-knop-label">Crescendo CVO Pro</span>

      <svg class="cvo-hex-icon" viewBox="0 0 100 115" xmlns="http://www.w3.org/2000/svg">
        <polygon class="hex-bg" points="50,2 95,28 95,87 50,113 5,87 5,28"/>
        <path d="M28,66 A22,22 0 0 1 72,66" fill="none" stroke="#4d5554" stroke-width="4" stroke-linecap="round"/>
        <line x1="50" y1="42" x2="50" y2="48" stroke="#4d5554" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="31" y1="52" x2="35" y2="55" stroke="#4d5554" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="69" y1="52" x2="65" y2="55" stroke="#4d5554" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="50" y1="66" x2="62" y2="50" stroke="#4d5554" stroke-width="4" stroke-linecap="round"/>
        <circle cx="50" cy="66" r="4.5" fill="#4d5554"/>

      <svg class="cvo-hex-icon" viewBox="0 0 100 115" xmlns="http://www.w3.org/2000/svg">
        <polygon class="hex-bg" points="50,2 95,28 95,87 50,113 5,87 5,28"/>
        <path d="M30,58 V51 a20,20 0 0 1 40,0 V58" fill="none" stroke="#4d5554" stroke-width="4" stroke-linecap="round"/>
        <rect x="25" y="55" width="11" height="18" rx="3.5" fill="none" stroke="#4d5554" stroke-width="4"/>
        <rect x="64" y="55" width="11" height="18" rx="3.5" fill="none" stroke="#4d5554" stroke-width="4"/>
        <path d="M69,73 Q69,82 55,82" fill="none" stroke="#4d5554" stroke-width="4" stroke-linecap="round"/>
        <circle cx="51" cy="82" r="3.2" fill="#4d5554"/>

    <div class="cvo-knop-tekst">
      <span class="cvo-knop-label">ICT Helpdesk</span>
    </div>
  </a>

</div>

</body>
</html>
