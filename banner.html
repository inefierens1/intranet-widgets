<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: transparent; font-family: 'Calibri', 'Segoe UI', sans-serif; }
    .cvo-banner-wrapper { width: 100%; background-color: #4d5554; color: #ffffff; }
    .cvo-banner-inner { display: flex; align-items: center; gap: 1.2rem; padding: 0.9rem 1.6rem; }
    .cvo-banner-hex { flex-shrink: 0; width: 36px; height: 42px; }
    .cvo-banner-tekst { flex: 1; }
    .cvo-banner-titel { font-weight: 700; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 0.08em; color: #ffffff; margin-bottom: 0.15rem; }
    .cvo-banner-bericht { font-size: 0.88rem; font-weight: 300; color: rgba(255,255,255,0.88); line-height: 1.4; }
    .cvo-banner-accent { color: #ced7d2; font-weight: 700; }
    .cvo-banner-streep { width: 100%; height: 3px; background: linear-gradient(to right, #a28790, #889a91, #4a4247); }
  </style>
</head>
<body>
  <div class="cvo-banner-wrapper">
    <div class="cvo-banner-streep"></div>
    <div class="cvo-banner-inner">
      <svg class="cvo-banner-hex" viewBox="0 0 100 115" xmlns="http://www.w3.org/2000/svg">
        <polygon points="50,2 95,28 95,87 50,113 5,87 5,28" fill="#889a91"/>
        <text x="50" y="68" text-anchor="middle" font-size="52" font-family="Calibri,sans-serif" font-weight="bold" fill="#ffffff">!</text>
      </svg>
      <div class="cvo-banner-tekst">
        <div class="cvo-banner-titel">Vernieuwing in aantocht</div>
        <div class="cvo-banner-bericht">
          We werken aan een gloednieuw medewerkersportaal voor jou. <span class="cvo-banner-accent">Vanaf 01 september 2026</span> stap je mee in een frisse, vernieuwde digitale omgeving — fijn om je alvast warm te verwelkomen!
        </div>
      </div>
    </div>
    <div class="cvo-banner-streep"></div>
  </div>
</body>
</html>
