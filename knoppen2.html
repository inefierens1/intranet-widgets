<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: transparent; font-family: 'Calibri', 'Segoe UI', sans-serif; }
    .cvo-knoppen-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.8rem; background: transparent; padding: 0; }
    .cvo-office-knop { display: flex; align-items: center; gap: 0.9rem; padding: 0.9rem 1rem; background-color: transparent; border: none; cursor: pointer; text-decoration: none; color: #000000; position: relative; overflow: hidden; }
    .cvo-office-knop::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; }
    .cvo-knop-outlook::before    { background-color: #a28790; }
    .cvo-knop-agenda::before     { background-color: #889a91; }
    .cvo-knop-onedrive::before   { background-color: #4a4247; }
    .cvo-knop-sharepoint::before { background-color: #5e91a5; }
    .cvo-hex-wrapper { flex-shrink: 0; width: 48px; height: 48px; }
    .cvo-hex-icon { width: 48px; height: 48px; }
    .cvo-knop-outlook .cvo-hex-icon polygon.hex-bg    { fill: #dacfd3; }
    .cvo-knop-agenda .cvo-hex-icon polygon.hex-bg     { fill: #ced7d2; }
    .cvo-knop-onedrive .cvo-hex-icon polygon.hex-bg   { fill: #c8c6c7; }
    .cvo-knop-sharepoint .cvo-hex-icon polygon.hex-bg { fill: #b3cdc5; }
    .cvo-knop-tekst { display: flex; flex-direction: column; }
    .cvo-knop-label { font-family: 'Calibri', 'Segoe UI', sans-serif; font-weight: 700; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.04em; color: #4d5554; line-height: 1.2; }
    .cvo-knop-sub { font-size: 0.73rem; color: #999999; margin-top: 0.15rem; font-weight: 300; }
  </style>
</head>
<body>

<div class="cvo-knoppen-grid">

  <a href="https://outlook.office.com/mail/" target="_blank" class="cvo-office-knop cvo-knop-outlook">
    <div class="cvo-hex-wrapper">
      <svg class="cvo-hex-icon" viewBox="0 0 100 115" xmlns="http://www.w3.org/2000/svg">
        <polygon class="hex-bg" points="50,2 95,28 95,87 50,113 5,87 5,28"/>
        <rect x="28" y="38" width="44" height="32" rx="2" fill="none" stroke="#4d5554" stroke-width="4"/>
        <polyline points="28,40 50,60 72,40" fill="none" stroke="#4d5554" stroke-width="4" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="cvo-knop-tekst">
      <span class="cvo-knop-label">Mijn berichten</span>
      <span class="cvo-knop-sub">Outlook e-mail</span>
    </div>
  </a>

  <a href="https://outlook.office.com/calendar/" target="_blank" class="cvo-office-knop cvo-knop-agenda">
    <div class="cvo-hex-wrapper">
      <svg class="cvo-hex-icon" viewBox="0 0 100 115" xmlns="http://www.w3.org/2000/svg">
        <polygon class="hex-bg" points="50,2 95,28 95,87 50,113 5,87 5,28"/>
        <rect x="27" y="36" width="46" height="40" rx="2" fill="none" stroke="#4d5554" stroke-width="4"/>
        <line x1="27" y1="48" x2="73" y2="48" stroke="#4d5554" stroke-width="4"/>
        <line x1="38" y1="30" x2="38" y2="42" stroke="#4d5554" stroke-width="4" stroke-linecap="round"/>
        <line x1="62" y1="30" x2="62" y2="42" stroke="#4d5554" stroke-width="4" stroke-linecap="round"/>
        <rect x="36" y="55" width="8" height="7" rx="1" fill="#4d5554"/>
        <rect x="56" y="55" width="8" height="7" rx="1" fill="#4d5554"/>
      </svg>
    </div>
    <div class="cvo-knop-tekst">
      <span class="cvo-knop-label">Mijn agenda</span>
      <span class="cvo-knop-sub">Outlook kalender</span>
    </div>
  </a>

  <a href="https://cvocrescendo-my.sharepoint.com" target="_blank" class="cvo-office-knop cvo-knop-onedrive">
    <div class="cvo-hex-wrapper">
      <svg class="cvo-hex-icon" viewBox="0 0 100 115" xmlns="http://www.w3.org/2000/svg">
        <polygon class="hex-bg" points="50,2 95,28 95,87 50,113 5,87 5,28"/>
        <path d="M35,70 Q22,70 22,58 Q22,48 32,46 Q33,34 45,34 Q55,34 58,43 Q70,42 72,52 Q80,52 80,61 Q80,70 68,70 Z" fill="none" stroke="#4d5554" stroke-width="4" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="cvo-knop-tekst">
      <span class="cvo-knop-label">Mijn OneDrive</span>
      <span class="cvo-knop-sub">Persoonlijke opslag</span>
    </div>
  </a>

  <a href="https://www.office.com/launch/sharepoint" target="_blank" class="cvo-office-knop cvo-knop-sharepoint">
    <div class="cvo-hex-wrapper">
      <svg class="cvo-hex-icon" viewBox="0 0 100 115" xmlns="http://www.w3.org/2000/svg">
        <polygon class="hex-bg" points="50,2 95,28 95,87 50,113 5,87 5,28"/>
        <polygon points="50,30 55,44 70,44 59,53 63,68 50,59 37,68 41,53 30,44 45,44" fill="none" stroke="#4d5554" stroke-width="3.5" stroke-linejoin="round"/>
      </svg>
    </div>
    <div class="cvo-knop-tekst">
      <span class="cvo-knop-label">Favoriete sites</span>
      <span class="cvo-knop-sub">SharePoint startpagina</span>
    </div>
  </a>

</div>

</body>
</html>
